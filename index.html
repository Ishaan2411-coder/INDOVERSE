<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INDOVERSE</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<section class="hero">
    <h1>INDOVERSE</h1>
    <p>A Universe Beyond Imagination</p>
    <button class="btn" onclick="scrollToBooks()">Explore Books</button>
</section>

<!-- BOOKS -->
<section class="section" id="books">
    <h2>Books</h2>

    <!-- COUPON -->
    <div class="coupon-box">
        <input type="text" id="coupon" placeholder="Enter Coupon Code">
        <button class="btn" onclick="applyCoupon()">Apply</button>
        <p id="couponMsg"></p>
    </div>

    <div class="books">

        <div class="card">
            <img src="SAHAY BOOK.png">
            <h3>SAHAY</h3>
            <button class="btn buy" onclick="openBook('SAHAY.pdf')">Buy Now</button>
        </div>

        <div class="card">
            <img src="INDOVAR BOOK.png">
            <h3>INDOVAR</h3>
            <button class="btn buy" onclick="openBook('INDOVAR.pdf')">Buy Now</button>
        </div>

        <div class="card">
            <img src="PARADOX BOOK.png">
            <h3>PARADOX</h3>
            <button class="btn buy" onclick="openBook('PARADOX.pdf')">Buy Now</button>
        </div>

        <div class="card">
            <img src="FRACTURE BOOK.png">
            <h3>FRACTURE</h3>
            <button class="btn buy" onclick="openBook('FRACTURE.pdf')">Buy Now</button>
        </div>

        <div class="card">
            <img src="ASCENT BOOK.png">
            <h3>ASCENT</h3>
            <button class="btn buy" onclick="openBook('ASCENT.pdf')">Buy Now</button>
        </div>

    </div>
</section>

<!-- YOUR BUYS -->
<section class="section" id="library" style="display:none;">
    <h2>Your Buys</h2>

    <div class="books">

        <div class="card"><h3>SAHAY</h3><button onclick="openBook('SAHAY.pdf')">Read</button></div>
        <div class="card"><h3>INDOVAR</h3><button onclick="openBook('INDOVAR.pdf')">Read</button></div>
        <div class="card"><h3>PARADOX</h3><button onclick="openBook('PARADOX.pdf')">Read</button></div>
        <div class="card"><h3>FRACTURE</h3><button onclick="openBook('FRACTURE.pdf')">Read</button></div>
        <div class="card"><h3>ASCENT</h3><button onclick="openBook('ASCENT.pdf')">Read</button></div>

    </div>
</section>

<!-- FEEDBACK -->
<section class="section">
    <h2>Feedback</h2>

    <div class="stars">
        <span onclick="rate(1)">★</span>
        <span onclick="rate(2)">★</span>
        <span onclick="rate(3)">★</span>
        <span onclick="rate(4)">★</span>
        <span onclick="rate(5)">★</span>
    </div>

    <textarea id="fb" placeholder="Write your feedback..."></textarea>
    <button class="btn" onclick="submitFeedback()">Submit</button>

    <p id="msg"></p>

    <div class="social">
        <a href="https://www.youtube.com/" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://www.instagram.com/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>
</section>

<!-- DISCLAIMER -->
<section class="section">
    <h2>Disclaimer</h2>
    <p>All content under INDOVERSE is original property of Ishaan Kr. Singh.</p>
</section>

<footer class="footer">
    © 2026 INDOVERSE
</footer>

<script src="script.js"></script>
</body>
</html>
