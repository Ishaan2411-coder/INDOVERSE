<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INDOVERSE</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">
    <h1>INDOVERSE</h1>
    <p>A Universe Beyond Imagination</p>
    <button class="btn" onclick="scrollToBooks()">Explore Books</button>
</section>

<section class="section" id="books">
    <h2>Books</h2>

    <!-- COUPON -->
    <div class="coupon-box">
        <input type="text" id="coupon" placeholder="Enter Coupon Code">
        <button class="btn" onclick="applyCoupon()">Apply</button>
        <p id="couponMsg"></p>
    </div>

    <div class="books">

        <div class="card">
            <img src="SAHAY BOOK.png" class="cover">
            <h3>SAHAY</h3>
            <div class="price">₹59</div>
            <button class="btn buy">Buy Now</button>
        </div>

        <div class="card">
            <img src="INDOVAR BOOK.png" class="cover">
            <h3>INDOVAR</h3>
            <div class="price">₹99</div>
            <button class="btn buy">Buy Now</button>
        </div>

        <div class="card">
            <img src="PARADOX BOOK.png" class="cover">
            <h3>PARADOX</h3>
            <div class="price">₹99</div>
            <button class="btn buy">Buy Now</button>
        </div>

        <div class="card">
            <img src="FRACTURE BOOK.png" class="cover">
            <h3>FRACTURE</h3>
            <div class="price">₹99</div>
            <button class="btn buy">Buy Now</button>
        </div>

        <div class="card">
            <img src="ASCENT BOOK.png" class="cover">
            <h3>ASCENT</h3>
            <div class="price">₹99</div>
            <button class="btn buy">Buy Now</button>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
