<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INDOVERSE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>INDOVERSE</h2>
    <button onclick="showTab('books')">📚 Books</button>
    <button onclick="showTab('buys')">🛒 Your Buys</button>
    <button onclick="showTab('feedback')">⭐ Feedback</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- BOOKS -->
<div id="books" class="tab active">
    <h2>Books</h2>

    <div class="books">

        <div class="card">
            <img src="SAHAY BOOK.png" class="cover">
            <h3>SAHAY</h3>
            <p>First 3 Chapters Free</p>
            <div class="price">₹59</div>
        </div>

        <div class="card">
            <img src="INDOVAR BOOK.png" class="cover">
            <h3>INDOVAR</h3>
            <div class="price">₹99</div>
        </div>

        <div class="card">
            <img src="PARADOX BOOK.png" class="cover">
            <h3>PARADOX</h3>
            <div class="price">₹99</div>
        </div>

        <div class="card">
            <img src="FRACTURE BOOK.png" class="cover">
            <h3>FRACTURE</h3>
            <div class="price">₹99</div>
        </div>

        <div class="card">
            <img src="ASCENT BOOK.png" class="cover">
            <h3>ASCENT</h3>
            <div class="price">₹99</div>
        </div>

    </div>

    <div class="offer">
        🔥 FULL INDOVERSE SET ₹399
    </div>

    <footer>
        © 2026 INDOVERSE | All Rights Reserved <br>
        ✍ Ishaan Kr. Singh
    </footer>
</div>

<!-- YOUR BUYS -->
<div id="buys" class="tab">
    <h2>Your Buys</h2>
    <p>No purchases yet</p>
</div>

<!-- FEEDBACK -->
<div id="feedback" class="tab">
    <h2>Feedback</h2>

    <div class="stars">
        <span onclick="rate(1)">★</span>
        <span onclick="rate(2)">★</span>
        <span onclick="rate(3)">★</span>
        <span onclick="rate(4)">★</span>
        <span onclick="rate(5)">★</span>
    </div>

    <textarea id="fb" placeholder="Write your feedback..."></textarea>
    <button class="btn" onclick="submitFeedback()">Submit</button>

    <p id="msg"></p>

    <div class="social">
        <a href="https://www.youtube.com/@IshaanSingh-x9f"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://www.instagram.com/singhs_creations01/"><i class="fa-brands fa-instagram"></i></a>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
